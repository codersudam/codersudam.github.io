<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudam | Programmer's Arsenal</title>
    <meta name="description" content="Curated gear and high-performance tools every developer must carefully pick.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Tech-Blue Cafe Variables */
        :root {
            --bg-base: #f0f4f8;
            --glass-panel: rgba(255, 255, 255, 0.45);
            --glass-hover: rgba(255, 255, 255, 0.75);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-main: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --border-glass: rgba(255, 255, 255, 0.7);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* DATA ASCEND PHYSICS CANVAS */
        #ascend-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at center, #f0f4f8 0%, #e2e8f0 100%);
        }

        /* HEADER & NAVIGATION */
        header {
            position: sticky;
            top: 20px;
            z-index: 100;
            background: var(--glass-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 100px;
            padding: 16px 32px;
            margin: 0 auto;
            max-width: 1200px;
            width: 92%;
            box-shadow: var(--shadow-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            color: var(--text-main);
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .brand-logo:hover {
            transform: scale(1.02);
        }

        .nav-btn {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .nav-btn:hover { color: var(--accent-main); }

        /* MAIN CONTAINER */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 5%;
            width: 100%;
            flex-grow: 1;
        }

        /* --- PREMIUM PAGE HEADER --- */
        .page-header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeUp 0.8s ease forwards;
        }

        .page-title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-main), var(--accent-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-desc {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* GRID & CARDS */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
        }

        .menu-item {
            background: var(--glass-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-left: 1px solid rgba(255, 255, 255, 1);
            border-radius: 20px;
            padding: 24px;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            color: inherit;
            box-shadow: var(--shadow-glass);
            cursor: pointer; /* Indicates the entire card is clickable */
        }

        .menu-item:hover {
            transform: translateY(-6px);
            background: var(--glass-hover);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.12);
        }

        /* --- CARD MEDIA: CONTAIN + WHITE BG --- */
        .menu-media {
            width: 100%;
            aspect-ratio: 4 / 3; 
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 16px;
        }

        .menu-media img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transition: transform 0.5s ease;
        }

        .menu-item:hover .menu-media img {
            transform: scale(1.08);
        }

        .menu-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--accent-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .menu-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .menu-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            flex-grow: 1;
        }

        /* --- 3-BUTTON LAYOUT --- */
        .product-footer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 16px;
        }

        .action-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-outline {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-glass);
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            border-color: var(--border-glass);
        }

        .btn-outline.icon-only {
            flex: 0 0 44px;
            padding: 0;
        }

        .btn-solid {
            width: 100%;
            background: var(--text-main);
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition-smooth);
        }

        .btn-solid:hover {
            background: var(--accent-main);
            box-shadow: 0 4px 15px var(--accent-glow);
        }


        /* --- FLOATING MODAL OVERLAY & CARD --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            background: var(--glass-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-left: 1px solid rgba(255, 255, 255, 1);
            border-radius: 32px;
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: translateY(40px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            
            /* SCROLLBAR FIX: Masking layer */
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            padding: 0; 
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0) scale(1);
        }

        /* --- MODAL TOP BAR (FIXED) --- */
        .modal-top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid var(--border-glass);
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .modal-top-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            cursor: pointer;
            text-decoration: none;
        }

        .btn-amazon-modal {
            background: var(--accent-main);
            color: white;
            border: none;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-amazon-modal:hover { background: #2563eb; transform: translateY(-2px); }

        .btn-share-modal {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            border: 1px solid var(--border-glass);
        }
        .btn-share-modal:hover { background: #ffffff; transform: translateY(-2px); }

        .btn-close-modal {
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-main);
            border: 1px solid var(--border-glass);
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex; justify-content: center; align-items: center;
            padding: 0;
            margin-left: 12px;
        }
        .btn-close-modal:hover { background: var(--text-main); color: white; transform: rotate(90deg); }

        /* SCROLLBAR FIX: Inner scrollable area */
        .modal-scroll-area {
            overflow-y: auto;
            padding: 40px;
            flex-grow: 1;
            width: 100%;
        }

        /* Fixed Scrollbar styling for modal */
        .modal-scroll-area::-webkit-scrollbar {
            width: 8px;
        }
        .modal-scroll-area::-webkit-scrollbar-track {
            background: transparent;
            margin: 24px 0; /* Keeps track away from rounded edges */
        }
        .modal-scroll-area::-webkit-scrollbar-thumb {
            background: rgba(15, 23, 42, 0.2);
            border-radius: 10px;
        }
        .modal-scroll-area::-webkit-scrollbar-thumb:hover {
            background: rgba(15, 23, 42, 0.4);
        }

        /* --- MODAL SPLIT LAYOUT --- */
        .modal-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .modal-main-col {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .modal-media {
            background: #ffffff;
            border-radius: 24px;
            padding: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            aspect-ratio: 16/10;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }

        .modal-media img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .modal-desc {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Right Side Popup Panel for Specs */
        .modal-specs-col {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow-glass);
        }

        .modal-specs-header {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-main);
            display: inline-block;
            padding-bottom: 8px;
        }

        .modal-spec-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding: 14px 0;
            font-size: 0.95rem;
        }

        .modal-spec-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .modal-spec-item:first-child {
            padding-top: 0;
        }

        .modal-spec-key {
            font-weight: 700;
            color: var(--text-main);
            flex-basis: 45%;
            padding-right: 16px;
        }

        .modal-spec-val {
            color: var(--text-muted);
            flex-basis: 55%;
            text-align: right;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 60px 5% 40px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: auto;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 960px) {
            .modal-grid { grid-template-columns: 1fr; gap: 32px; }
            .modal-specs-col {
                background: transparent;
                border: none;
                padding: 0;
                box-shadow: none;
                border-top: 1px solid var(--border-glass);
                border-radius: 0;
                padding-top: 32px;
            }
        }

        @media (max-width: 860px) {
            .page-title { font-size: 2.8rem; }
        }

        @media (max-width: 640px) {
            header {
                width: 95%;
                padding: 12px 16px;
                top: 12px;
            }
            .menu-grid { grid-template-columns: 1fr; }
            .modal-top-bar { padding: 12px 16px; }
            .modal-top-btn { padding: 8px 12px; font-size: 0.85rem; }
            .btn-close-modal { width: 36px; height: 36px; margin-left: 8px; }
            .modal-scroll-area { padding: 24px 20px; }
            .modal-title { font-size: 1.8rem; }
            .modal-spec-item { flex-direction: column; text-align: left; gap: 4px; }
            .modal-spec-val { text-align: left; }
        }
    </style>
</head>

    <script>
        // --- DATA ASCEND PHYSICS ---
        const canvas = document.getElementById('ascend-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const mouse = { x: -1000, y: -1000, radius: 200 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initAscend();
        });

        class DataParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 2.5 + 1;
                this.speed = Math.random() * 1.5 + 0.3;
                this.baseOpacity = Math.random() * 0.4 + 0.1;
                this.opacity = this.baseOpacity;
                this.vx = 0;
                this.vy = -this.speed;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(59, 130, 246, ${this.opacity})`;
                ctx.fill();
            }
            
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.vx -= (dx / distance) * force * 0.5;
                    this.vy -= (dy / distance) * force * 0.5;
                    this.opacity = Math.min(1, this.opacity + 0.05);
                } else {
                    this.vx *= 0.95; 
                    this.vy += (-this.speed - this.vy) * 0.05;
                    this.opacity = Math.max(this.baseOpacity, this.opacity - 0.02);
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                    this.vx = 0;
                }
                if (this.x < -10) this.x = canvas.width + 10;
                if (this.x > canvas.width + 10) this.x = -10;

                this.draw();
            }
        }

        function initAscend() {
            particles = [];
            let numParticles = Math.floor((canvas.width * canvas.height) / 6000);
            if (numParticles > 250) numParticles = 250;
            for (let i = 0; i < numParticles; i++) {
                particles.push(new DataParticle());
            }
        }

        function animateAscend() {
            requestAnimationFrame(animateAscend);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.update());
        }

        initAscend();
        animateAscend();

        // --- GLOBAL PRODUCTS ARRAY & MODAL LOGIC ---
        let globalProducts = [];

        window.openModal = function(index) {
            const p = globalProducts[index];
            document.getElementById('modal-title').textContent = p.name || 'Product Details';
            document.getElementById('modal-img').src = p.imageUrl || '';
            document.getElementById('modal-desc').textContent = p.description || '';
            
            // Setup dynamic links for the fixed top bar
            document.getElementById('modal-buy-btn').href = p.affiliateLink || '#';
            document.getElementById('modal-share-btn').onclick = function() { shareProduct(index); };
            
            // Format Key:Value Specs Safely (Bulletproof Parsing)
            let specsHTML = '';
            if (Array.isArray(p.specs) && p.specs.length > 0) {
                specsHTML = p.specs.map(spec => {
                    const specStr = String(spec);
                    const colonIndex = specStr.indexOf(':');
                    
                    if (colonIndex !== -1) {
                        const key = specStr.substring(0, colonIndex).trim();
                        const val = specStr.substring(colonIndex + 1).trim();
                        
                        return `<div class="modal-spec-item">
                                    <span class="modal-spec-key">${key}</span>
                                    <span class="modal-spec-val">${val}</span>
                                </div>`;
                    } else {
                        return `<div class="modal-spec-item">
                                    <span class="modal-spec-val" style="flex-basis: 100%; text-align: left;">${specStr.trim()}</span>
                                </div>`;
                    }
                }).join('');
            }
            
            document.getElementById('modal-specs-container').innerHTML = specsHTML;
            document.getElementById('product-modal').classList.add('active');
            document.body.style.overflow = 'hidden'; 
        };

        window.closeModal = function() {
            document.getElementById('product-modal').classList.remove('active');
            document.body.style.overflow = ''; 
        };

        // --- SHARE LOGIC ---
        window.shareProduct = async function(index) {
            const p = globalProducts[index];
            const shareData = {
                title: `Sudam | ${p.name}`,
                text: `Check out the ${p.name} - ${p.description}`,
                url: p.affiliateLink
            };
            
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('User canceled share or sharing failed.');
                }
            } else {
                try {
                    await navigator.clipboard.writeText(`${shareData.title}\n\n${shareData.url}`);
                    alert('Product link copied to clipboard!'); 
                } catch (err) {
                    console.error('Failed to copy text: ', err);
                }
            }
        };

        // --- FETCHING DATA FROM DATA/GEAR.JSON ---
        async function loadGear() {
            try {
                const response = await fetch('data/gear.json');
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                globalProducts = data.products || [];

                let gridHTML = '';

                if (globalProducts.length === 0) {
                    gridHTML = '<p style="text-align:center; padding: 20px; color: var(--text-muted); width: 100%;">No gear populated yet...</p>';
                } else {
                    globalProducts.forEach((product, index) => {
                        // Card with new 3-button layout and fully clickable parent
                        gridHTML += `
                            <div class="menu-item" onclick="openModal(${index})">
                                <div class="menu-media">
                                    <img src="${product.imageUrl}" alt="${product.name}" loading="lazy">
                                </div>
                                <div class="menu-tags">
                                    <span class="tag">${product.category}</span>
                                </div>
                                <h3 class="menu-title">${product.name}</h3>
                                <p class="menu-desc">${product.description}</p>
                                
                                <div class="product-footer">
                                    <div class="action-row">
                                        <button class="btn-outline" onclick="event.stopPropagation(); openModal(${index})" title="View Specifications">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                            Specs
                                        </button>
                                        <button class="btn-outline icon-only" onclick="event.stopPropagation(); shareProduct(${index})" title="Share Product">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                        </button>
                                    </div>
                                    <a href="${product.affiliateLink}" target="_blank" rel="noopener noreferrer" class="btn-solid" onclick="event.stopPropagation()">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                        View on Amazon
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                }

                document.getElementById('gear-grid').innerHTML = gridHTML;

            } catch (error) {
                console.error('Critical Data Loading Error:', error);
                document.getElementById('gear-grid').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 40px; background: rgba(255,0,0,0.05); border-radius: 20px; color: #ef4444;">
                        <strong>Failed to load data.</strong> Ensure data/gear.json is present and you are running a local server.
                    </div>
                `;
            }
        }

        loadGear();
    </script>
</body>
</html>
