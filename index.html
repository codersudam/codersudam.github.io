<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudam's Code Cafe | Interactive UI Studio</title>
    <meta name="description" content="Brewing high-fidelity HTML, CSS, and Vanilla JS components.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        /* Tech-Blue Cafe Variables */
        :root {
            --bg-base: #f0f4f8;
            --glass-panel: rgba(255, 255, 255, 0.45);
            --glass-hover: rgba(255, 255, 255, 0.75);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-main: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --border-glass: rgba(255, 255, 255, 0.7);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ORBITAL SWARM PHYSICS CANVAS */
        #physics-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        header {
            position: sticky;
            top: 20px;
            z-index: 100;
            background: var(--glass-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 100px;
            padding: 16px 32px;
            margin: 0 auto;
            max-width: 1200px;
            width: 92%;
            box-shadow: var(--shadow-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .brand-icon {
            background: var(--accent-main);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .nav-status {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-main);
            box-shadow: 0 0 0 0 var(--accent-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 5%;
            width: 100%;
            flex-grow: 1;
        }

        .section-header {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        /* 1. Featured Glass Card */
        .featured-card {
            background: var(--glass-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-left: 1px solid rgba(255, 255, 255, 1);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            box-shadow: var(--shadow-glass);
            margin-bottom: 60px;
            transition: var(--transition-smooth);
            text-decoration: none;
            color: inherit;
        }

        .featured-card:hover {
            transform: translateY(-4px);
            background: var(--glass-hover);
            box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.15);
        }

        .featured-media {
            width: 100%;
            height: 100%;
            min-height: 400px;
            position: relative;
            padding: 24px;
        }

        .featured-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .featured-content {
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .badge-blue {
            align-self: flex-start;
            background: rgba(59, 130, 246, 0.1);
            color: #2563eb;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 14px;
            border-radius: 50px;
            margin-bottom: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .featured-title {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .featured-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .btn-primary {
            align-self: flex-start;
            background: var(--text-main);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .featured-card:hover .btn-primary {
            background: var(--accent-main);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* 2. Menu Grid (Glass Cards) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
        }

        .menu-item {
            background: var(--glass-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-left: 1px solid rgba(255, 255, 255, 1);
            border-radius: 20px;
            padding: 20px;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow-glass);
        }

        .menu-item:hover {
            transform: translateY(-6px);
            background: var(--glass-hover);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.12);
        }

        .menu-media {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .menu-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .menu-item:hover .menu-media img {
            transform: scale(1.05);
        }

        .menu-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .menu-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .menu-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        footer {
            text-align: center;
            padding: 60px 5% 40px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 60px;
        }

        @media (max-width: 968px) {
            .featured-card {
                grid-template-columns: 1fr;
            }

            .featured-media {
                min-height: 250px;
                padding: 20px 20px 0 20px;
            }

            .featured-content {
                padding: 32px;
            }
        }

        @media (max-width: 640px) {
            header {
                width: 95%;
                padding: 12px 20px;
                top: 12px;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <canvas id="physics-canvas"></canvas>

    <header>
        <a href="#" class="brand-logo">
            <div class="brand-icon">&lt;/&gt;</div>
            Sudam's Code Cafe
        </a>
        <div class="nav-status">
            <div class="pulse-dot"></div>
            <span>Studio Live</span>
        </div>
    </header>

    <main class="container">

        <h2 class="section-header">Featured Brew</h2>
        <div id="featured-container"></div>

        <h2 class="section-header">The Menu</h2>
        <div class="menu-grid" id="project-grid"></div>

    </main>

    <footer>
        <p>&copy; 2026 Sudam's Code Cafe. Engineered for the frontend.</p>
    </footer>

    <script>
        // --- ORBITAL SWARM PHYSICS ---
        const canvas = document.getElementById('physics-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const colors = ['#3b82f6', '#60a5fa', '#93c5fd', '#1d4ed8'];

        const mouse = { x: canvas.width / 2, y: canvas.height / 2, radius: 300 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.velocity = {
                    x: (Math.random() - 0.5) * 1.5,
                    y: (Math.random() - 0.5) * 1.5
                };
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    let tangentialX = -dy / distance;
                    let tangentialY = dx / distance;
                    this.velocity.x += (dx / distance) * force * 0.1 + tangentialX * force * 0.15;
                    this.velocity.y += (dy / distance) * force * 0.1 + tangentialY * force * 0.15;
                }

                this.velocity.x *= 0.98;
                this.velocity.y *= 0.98;
                this.x += this.velocity.x;
                this.y += this.velocity.y;

                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                this.draw();
            }
        }

        function init() {
            particles = [];
            let numParticles = Math.floor((canvas.width * canvas.height) / 8000);
            if (numParticles > 400) numParticles = 400;
            for (let i = 0; i < numParticles; i++) { particles.push(new Particle()); }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(240, 244, 248, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => particle.update());
        }

        init();
        animate();

        // --- BULLETPROOF DATA INTEGRATION ---
        async function loadTutorials() {
            try {
                // 1. Fetch Data
                const response = await fetch('./data/tutorials.json');
                const rawTutorials = await response.json();

                // 2. Filter out any corrupted or blank entries
                let tutorials = rawTutorials.filter(tut => tut && tut.id && tut.title);

                if (tutorials.length === 0) {
                    document.getElementById('featured-container').innerHTML = '<p style="text-align:center;">No valid tutorials found.</p>';
                    return;
                }

                // 3. Pick the Random Index Safely
                const randomIndex = Math.floor(Math.random() * tutorials.length);

                // 4. Copy the featured video into its own variable
                const featured = tutorials[randomIndex];

                // 5. Remove the featured video from the grid array so it doesn't show twice
                tutorials.splice(randomIndex, 1);

                // --- RENDER FEATURED CARD ---
                // Using ternary operators strictly to guarantee no "undefined" text appears
                const fTitle = featured.title ? featured.title : 'Featured Tutorial';
                const fDesc = featured.description ? featured.description : '';
                const fImg = featured.thumbnailUrl ? featured.thumbnailUrl : `https://img.youtube.com/vi/${featured.youtubeVideoId}/maxresdefault.jpg`;

                document.getElementById('featured-container').innerHTML = `
                    <a href="tutorial.html?id=${featured.id}" class="featured-card">
                        <div class="featured-media">
                            <img src="${fImg}" alt="Thumbnail">
                        </div>
                        <div class="featured-content">
                            <span class="badge-blue">Featured Pick ⭐</span>
                            <h3 class="featured-title">${fTitle}</h3>
                            <p class="featured-desc">${fDesc}</p>
                            <div class="btn-primary">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                Watch & Get Code
                            </div>
                        </div>
                    </a>
                `;

                // --- RENDER GRID ---
                let gridHTML = '';

                if (tutorials.length === 0) {
                    gridHTML = '<p style="text-align:center; padding: 20px; color: var(--text-muted); width: 100%;">More tutorials brewing soon...</p>';
                } else {
                    tutorials.forEach(tut => {
                        const tTitle = tut.title ? tut.title : 'Tutorial';
                        const tDesc = tut.description ? tut.description : '';
                        const tImg = tut.thumbnailUrl ? tut.thumbnailUrl : `https://img.youtube.com/vi/${tut.youtubeVideoId}/maxresdefault.jpg`;
                        const tTagsHTML = (tut.tags && Array.isArray(tut.tags))
                            ? tut.tags.map(tag => `<span class="tag">${tag}</span>`).join('')
                            : '';

                        gridHTML += `
                            <a href="tutorial.html?id=${tut.id}" class="menu-item">
                                <div class="menu-media">
                                    <img src="${tImg}" alt="Thumbnail">
                                </div>
                                <div class="menu-tags">
                                    ${tTagsHTML}
                                </div>
                                <h3 class="menu-title">${tTitle}</h3>
                                <p class="menu-desc">${tDesc}</p>
                            </a>
                        `;
                    });
                }

                document.getElementById('project-grid').innerHTML = gridHTML;

            } catch (error) {
                console.error('Critical Data Loading Error:', error);
                document.getElementById('featured-container').innerHTML = '<p style="text-align:center; padding: 20px; color: #ef4444; font-weight: bold;">Brewing the latest tutorials... (Ensure you are running a local server)</p>';
            }
        }

        // Initialize the fetch
        loadTutorials();
    </script>
</body>

</html>
