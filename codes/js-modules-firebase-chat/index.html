<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Chat App</title>
<style>
    /* Added base resets for perfect responsive alignment */
    * {
        box-sizing: border-box;
        font-family: sans-serif;
    }
    
    body {
        margin: 0;
        padding: 0;
        background: #000;
    }
    
    #messages {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: calc(100% - 50px);
        overflow-y: auto;
        padding: 10px;
    }
    
    #sendMsg {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background: #AAA;
    }
    
    #msgTxt {
        position: absolute;
        left: 0;
        top: 0;
        width: calc(100% - 100px);
        height: 100%;
        padding-left: 10px;
        border: none;
        outline: none;
    }
    
    #msgBtn {
        position: absolute;
        right: 0;
        top: 0;
        width: 100px;
        height: 100%;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }
    
    .outer {
        width: 100%;
        margin-top: 10px;
        display: flex;
    }
    
    .inner {
        padding: 10px;
        border-radius: 10px;
        background: #fff;
        color: #000;
        /* Prevents long messages from overflowing small screens */
        max-width: 80%;
        word-wrap: break-word;
    }
    
    .me {
        background: #8800ff;
        color: #fff;
    }

    /* Slight styling for the appended delete button */
    .me button {
        margin-left: 8px;
        cursor: pointer;
        background: #ff3333;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 4px 8px;
    }
</style>
</head>
<body>

<div id="messages"></div>
<div id="sendMsg">
    <input type="text" id="msgTxt" placeholder="ENTER YOUR MSG...">
    <input type="submit" id="msgBtn" value="send" onclick="module.sendMsg()">
</div>

<script type="module">
    // Import Firebase SDKs (Modular v9)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, remove, onChildAdded, onChildRemoved } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC3l0hD2-xmXzsJyRWzIzao-rypkeOd0o",
        authDomain: "coder-8ddcf.firebaseapp.com",
        projectId: "coder-8ddcf",
        storageBucket: "coder-8ddcf.appspot.com",
        messagingSenderId: "603139974872",
        appId: "1:603139974872:web:98826f93506f42111dd9ad"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // variables
    var msgTxt = document.getElementById("msgTxt");
    var sender;

    // Session Storage logic to request user name once
    if(sessionStorage.getItem("sender")) {
        sender = sessionStorage.getItem("sender");
    } else {
        sender = prompt("PLEASE ENTER YOUR NAME");
        sessionStorage.setItem("sender", sender);
    }

    // Bind module to the global window object for inline HTML onclick calls
    window.module = {};

    // TO SEND MESSAGES
    module.sendMsg = function sendMsg() {
        var msg = msgTxt.value;
        if(msg.trim() === "") return; // Prevent sending blank messages
        
        var timestamp = new Date().getTime();
        set(ref(db, "messages/" + timestamp), {
            msg: msg,
            sender: sender
        });
        msgTxt.value = ""; // Clear input after sending
    }

    // TO RECEIVE MSG
    var messages = document.getElementById("messages");
    onChildAdded(ref(db, "messages"), (data) => {
        // Logic to differentiate "me" vs "other" users
        if(data.val().sender == sender) {
            messages.innerHTML += "<div style='justify-content:flex-end' class='outer' id='"+data.key+"'><div class='inner me'>you : "+data.val().msg+" <button onclick='module.dltMsg(\""+data.key+"\")'>DELETE</button></div></div>";
        } else {
            messages.innerHTML += "<div style='justify-content:flex-start' class='outer' id='"+data.key+"'><div class='inner'>"+data.val().sender+" : "+data.val().msg+"</div></div>";
        }
    });

    // TO DELETE MSG
    module.dltMsg = function dltMsg(key) {
        remove(ref(db, "messages/" + key));
    }

    // WHEN MSG IS DELETED
    onChildRemoved(ref(db, "messages"), (data) => {
        var msgBox = document.getElementById(data.key);
        if(msgBox) {
            messages.removeChild(msgBox); // Removes the exact node from the DOM dynamically
        }
    });
</script>
</body>
</html>
