<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Hover Button</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Minimalist Foundation */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f7f7f8; /* Soft, neutral off-white */
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Clean, borderless button design */
        .magnetic-btn {
            position: relative;
            padding: 24px 48px;
            background-color: #0e0e10; /* Deep matte black */
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: none;
            border-radius: 50px; /* Pill shape */
            cursor: pointer;
            overflow: hidden;
            
            /* Smooth snap-back transition */
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Inner text styling for parallax effect */
        .btn-text {
            display: inline-block;
            pointer-events: none; /* Crucial so the text doesn't interrupt mouse events */
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Subtle focus state for accessibility without visual clutter */
        .magnetic-btn:focus-visible {
            outline: 2px solid #0e0e10;
            outline-offset: 4px;
        }
    </style>
</head>
<body>

    <button class="magnetic-btn" id="magneticBtn">
        <span class="btn-text" id="btnText">Hover Me</span>
    </button>

    <script>
        const btn = document.getElementById('magneticBtn');
        const text = document.getElementById('btnText');

        // Mouse Move Event: Pulling the button towards the cursor
        btn.addEventListener('mousemove', (e) => {
            // Get the button's size and position relative to the viewport
            const rect = btn.getBoundingClientRect();
            
            // Calculate the distance of the mouse from the exact center of the button
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            // Apply translation. Multiplying by a decimal creates the "heavy" magnetic pull
            btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
            
            // Apply a stronger translation to the text to create a 3D parallax effect
            text.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
            
            // Remove transitions during movement for instantaneous tracking
            btn.style.transition = 'none';
            text.style.transition = 'none';
        });

        // Mouse Leave Event: Snapping back to the center
        btn.addEventListener('mouseleave', () => {
            // Reset transforms
            btn.style.transform = 'translate(0px, 0px)';
            text.style.transform = 'translate(0px, 0px)';
            
            // Re-enable the smooth cubic-bezier transitions
            btn.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
            text.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
        });
    </script>
</body>
</html>
