<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced UX | Elastic Slider</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Mono:wght@700&display=swap');

    /* Light Theme Base */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f1f5f9;
      background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, transparent 70%);
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding: 24px;
      box-sizing: border-box;
      color: #0f172a;
    }

    /* Main Interface Card */
    .pricing-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 40px;
      box-shadow: 
        0 20px 40px rgba(15, 23, 42, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 1);
      border: 1px solid rgba(226, 232, 240, 0.8);
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-sizing: border-box;
    }

    .header-text {
      font-size: 1rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }

    /* Odometer Price Display */
    .price-display {
      font-family: 'Space Mono', monospace;
      font-size: 4rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
      line-height: 1;
      letter-spacing: -2px;
      display: flex;
      align-items: flex-start;
    }

    .currency {
      font-size: 2rem;
      margin-top: 8px;
      margin-right: 4px;
      color: #3b82f6;
    }

    .billing-cycle {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      color: #94a3b8;
      letter-spacing: 0;
      align-self: flex-end;
      margin-bottom: 8px;
      margin-left: 8px;
    }

    /* --- The Advanced Slider Area --- */
    .slider-container {
      position: relative;
      width: 100%;
      height: 140px;
      margin-top: 20px;
      /* CRITICAL UX: Prevent page scrolling when dragging on mobile */
      touch-action: none; 
      user-select: none;
    }

    /* SVG Canvas for the Elastic Line */
    svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none; /* Let pointer events pass through to the container */
    }

    /* The Draggable Thumb */
    .thumb {
      position: absolute;
      top: 70px; /* Center of the 140px container */
      left: 20px;
      width: 32px;
      height: 32px;
      background: #ffffff;
      border: 3px solid #3b82f6;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
      cursor: grab;
      z-index: 10;
      /* Hardware acceleration */
      will-change: left, top, transform;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
    }

    .thumb:active {
      cursor: grabbing;
      transform: translate(-50%, -50%) scale(0.85); /* Tactile squish effect */
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.4);
    }

    /* Floating Tooltip */
    .tooltip {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #1e293b;
      color: #ffffff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      transform: translate(-50%, -100%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      will-change: left, top;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 5px 5px 0;
      border-style: solid;
      border-color: #1e293b transparent transparent transparent;
    }

    .slider-container.active .tooltip {
      opacity: 1;
    }

  </style>
</head>
<body>

  <div class="pricing-card">
    <p class="header-text">Pro Tier Selection</p>
    
    <div class="price-display">
      <span class="currency">$</span>
      <span id="priceVal">10</span>
      <span class="billing-cycle">/mo</span>
    </div>

    <div class="slider-container" id="sliderArea">
      
      <svg id="sliderSvg">
        <defs>
          <clipPath id="activeClip">
            <rect id="clipRect" x="0" y="0" width="0" height="140" />
          </clipPath>
        </defs>
        
        <path id="bgTrack" d="" stroke="#e2e8f0" stroke-width="6" fill="none" stroke-linecap="round"/>
        
        <path id="activeTrack" d="" stroke="#3b82f6" stroke-width="6" fill="none" stroke-linecap="round" clip-path="url(#activeClip)"/>
      </svg>

      <div class="tooltip" id="tooltip">10GB</div>
      <div class="thumb" id="thumb"></div>
      
    </div>
  </div>

  <script>
    // --- Elements ---
    const sliderArea = document.getElementById('sliderArea');
    const svg = document.getElementById('sliderSvg');
    const bgTrack = document.getElementById('bgTrack');
    const activeTrack = document.getElementById('activeTrack');
    const clipRect = document.getElementById('clipRect');
    const thumb = document.getElementById('thumb');
    const tooltip = document.getElementById('tooltip');
    const priceVal = document.getElementById('priceVal');

    // --- State & Dimensions ---
    let isDragging = false;
    let width = sliderArea.clientWidth;
    const height = 140;
    const centerY = height / 2; // 70
    const padding = 20; // Keep track inside container edges

    // Minimum and Maximum real values
    const minPrice = 10;
    const maxPrice = 250;

    // --- Physics Variables ---
    // Thumb X (Linear)
    let thumbX = padding;
    
    // Tooltip X (LERP - Linear Interpolation for dragging behind)
    let tooltipX = padding;

    // Track Y (Spring Physics)
    let currentY = centerY;
    let targetY = centerY;
    let velocityY = 0;
    const tension = 0.15;  // Stiffness of the rubber band
    const friction = 0.82; // How quickly it stops wobbling

    // Price Odometer (LERP)
    let displayPrice = minPrice;
    let targetPrice = minPrice;

    // --- Core Logic ---
    function updatePhysics() {
      // 1. Spring Physics for the Elastic Line (Y-Axis)
      const displacementY = targetY - currentY;
      velocityY += displacementY * tension;
      velocityY *= friction;
      currentY += velocityY;

      // 2. LERP for the Tooltip (X-Axis lag effect)
      tooltipX += (thumbX - tooltipX) * 0.2;

      // 3. LERP for Odometer Price text
      displayPrice += (targetPrice - displayPrice) * 0.15;
      
      render();
      requestAnimationFrame(updatePhysics);
    }

    function render() {
      // Construct the SVG Quadratic Bezier Curve (Start -> Control Point -> End)
      // Control point is mapped to the thumb's current X and the spring's Y
      const pathData = `M ${padding} ${centerY} Q ${thumbX} ${currentY} ${width - padding} ${centerY}`;
      
      bgTrack.setAttribute('d', pathData);
      activeTrack.setAttribute('d', pathData);
      
      // Update the clip-path rectangle to reveal the blue track up to the thumb
      clipRect.setAttribute('width', thumbX);

      // Position the physical DOM elements
      thumb.style.left = `${thumbX}px`;
      thumb.style.top = `${currentY}px`;
      
      tooltip.style.left = `${tooltipX}px`;
      tooltip.style.top = `${currentY - 30}px`;

      // Update Text
      priceVal.innerText = Math.round(displayPrice);
      tooltip.innerText = `${Math.round(displayPrice)}GB`;
    }

    // --- Interaction Handlers ---
    // Use Pointer Events to handle Mouse, Touch, and Stylus simultaneously
    function handlePointerDown(e) {
      isDragging = true;
      sliderArea.classList.add('active');
      sliderArea.setPointerCapture(e.pointerId); // Keep tracking even if cursor leaves container
      handlePointerMove(e);
    }

    function handlePointerMove(e) {
      if (!isDragging) return;

      const rect = sliderArea.getBoundingClientRect();
      
      // Calculate X constraint (min: 20px, max: width - 20px)
      let rawX = e.clientX - rect.left;
      thumbX = Math.max(padding, Math.min(rawX, width - padding));

      // Calculate Y constraint (Elastic stretch max +/- 40px)
      let rawY = e.clientY - rect.top;
      targetY = Math.max(centerY - 40, Math.min(rawY, centerY + 40));

      // Calculate the underlying value based on X percentage
      const percentage = (thumbX - padding) / (width - padding * 2);
      targetPrice = minPrice + percentage * (maxPrice - minPrice);
    }

    function handlePointerUp(e) {
      isDragging = false;
      sliderArea.classList.remove('active');
      sliderArea.releasePointerCapture(e.pointerId);
      
      // Snap the target back to center to trigger the "Boing" physics
      targetY = centerY; 
    }

    // --- Listeners & Init ---
    sliderArea.addEventListener('pointerdown', handlePointerDown);
    sliderArea.addEventListener('pointermove', handlePointerMove);
    sliderArea.addEventListener('pointerup', handlePointerUp);
    sliderArea.addEventListener('pointercancel', handlePointerUp);

    // Handle Window Resize properly
    window.addEventListener('resize', () => {
      width = sliderArea.clientWidth;
      // Recalculate thumbX based on current price percentage
      const percentage = (targetPrice - minPrice) / (maxPrice - minPrice);
      thumbX = padding + percentage * (width - padding * 2);
      tooltipX = thumbX;
    });

    // Start the infinite 60fps render loop
    updatePhysics();
  </script>

</body>
</html>
