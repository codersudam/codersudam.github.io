<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Island Micro-Interaction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

    body {
      margin: 0;
      min-height: 100vh;
      background-color: #0e0e10;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Container holding the island to keep it positioned high up */
    .container {
      position: absolute;
      top: 50%;
      -webkit-transform:translateY(-50%);
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .island {
      position: relative;
      width: 160px;
      height: 44px;
      background: #000000;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      /* The magic spring physics transition */
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                  height 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                  border-radius 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .island.expanded {
      width: 340px;
      height: 180px;
      border-radius: 36px;
    }

    /* --- Collapsed State (Mini Player) --- */
    .collapsed-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
      box-sizing: border-box;
      transition: opacity 0.2s ease, transform 0.3s ease;
      opacity: 1;
      transform: scale(1);
    }

    .island.expanded .collapsed-view {
      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;
    }

    .mini-album {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff007a, #7a00ff);
    }

    .equalizer {
      display: flex;
      gap: 3px;
      align-items: center;
      height: 16px;
    }

    .bar {
      width: 3px;
      background: #ff007a;
      border-radius: 3px;
      animation: bounce 1s ease-in-out infinite;
    }

    .bar:nth-child(1) { height: 60%; animation-delay: 0.1s; }
    .bar:nth-child(2) { height: 100%; animation-delay: 0.2s; }
    .bar:nth-child(3) { height: 40%; animation-delay: 0.3s; }
    .bar:nth-child(4) { height: 80%; animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }

    /* --- Expanded State (Full Player) --- */
    .expanded-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s;
      pointer-events: none;
    }

    .island.expanded .expanded-view {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .large-album {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: linear-gradient(135deg, #ff007a, #7a00ff);
      box-shadow: 0 8px 20px rgba(255, 0, 122, 0.3);
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .title {
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }

    .artist {
      color: #888888;
      font-size: 0.9rem;
      margin: 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-top: 10px;
    }

    .controls svg {
      fill: #ffffff;
      width: 24px;
      height: 24px;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .controls svg:hover {
      transform: scale(1.1);
      opacity: 0.8;
    }

    .play-btn {
      width: 36px !important;
      height: 36px !important;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="island" id="dynamicIsland">
      
      <div class="collapsed-view">
        <div class="mini-album"></div>
        <div class="equalizer">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>

      <div class="expanded-view">
        <div class="top-row">
          <div class="large-album"></div>
          <div class="info">
            <h3 class="title">Neon Nights</h3>
            <p class="artist">Synthwave Dreams</p>
          </div>
        </div>
        
        <div class="controls">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          <svg class="play-btn" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </div>
      </div>

    </div>
  </div>

  <script>
    const island = document.getElementById('dynamicIsland');

    island.addEventListener('click', () => {
      island.classList.toggle('expanded');
    });
  </script>

</body>
</html>
