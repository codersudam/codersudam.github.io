<html>

<head>
    <style>
        div {
            position: fixed;
            height: 100%;
            width: 75%;
            background: #00de74;
            left: -100%;
            top: 0;
            padding: 10px;
            transition: .5s;
        }
    </style>
</head>

<body>
    <button onclick="openBar()">open</button>
    <div>
        <button onclick="closeBar()">close</button>
    </div>
    <script>
        const div = document.querySelector('div');
        function openBar() {
            div.style.left = "0";
        }
        function closeBar() {
            div.style.left = "-100%";
        }
    </script>
</body>

</html>
