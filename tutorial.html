<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial | Sudam's Code Cafe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-base: #f0f4f8; 
            --glass-panel: rgba(255, 255, 255, 0.45);
            --glass-hover: rgba(255, 255, 255, 0.75);
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --accent-main: #3b82f6; 
            --border-glass: rgba(255, 255, 255, 0.7);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            --code-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 20px;
            z-index: 100;
            background: var(--glass-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 100px;
            padding: 16px 32px;
            margin: 0 auto;
            max-width: 1200px;
            width: 92%;
            box-shadow: var(--shadow-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s ease;
        }

        .back-btn:hover { color: var(--accent-main); }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 5%;
        }

        .video-container {
            background: var(--glass-panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-glass);
            margin-bottom: 40px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .tutorial-header { margin-top: 24px; }
        .tutorial-title { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        .tutorial-desc { color: var(--text-muted); font-size: 1.1rem; }

        /* Workspace & Tabs */
        .code-workspace {
            background: var(--glass-panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-glass);
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid var(--border-glass);
            padding-right: 16px;
        }

        .tab-links {
            display: flex;
        }

        .tab-btn {
            padding: 16px 24px;
            background: transparent;
            border: none;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: var(--accent-main);
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 3px solid var(--accent-main);
        }

        /* Workspace Action Bar */
        .action-bar {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            color: var(--accent-main);
            background: rgba(255, 255, 255, 0.8);
            transform: scale(1.05);
        }

        /* Critical Fix: min-height: 0 prevents flex children from blowing past 100vh */
        .tab-content { display: none; padding: 0; flex-grow: 1; min-height: 0; }
        .tab-content.active { display: flex; flex-direction: column; height: 100%; }

        /* Code & Preview Rendering */
        pre[class*="language-"],
        code[class*="language-"],
        code[class*="language-"] * {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.95rem !important;
        }

        pre[class*="language-"] {
            margin: 0 !important;
            padding: 24px !important;
            border-radius: 0 0 24px 24px !important;
            background: var(--code-bg) !important;
            min-height: 400px;
            flex-grow: 1;
            overflow: auto !important; /* Enables scrolling */
        }

        /* Custom Dark Scrollbar for Code View */
        pre[class*="language-"]::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        pre[class*="language-"]::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0 0 24px 0;
        }
        pre[class*="language-"]::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }
        pre[class*="language-"]::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .preview-pane {
            padding: 0; 
            background: #fff;
            min-height: 400px;
            display: flex;
            flex-grow: 1;
            align-items: center;
            justify-content: center;
            border-radius: 0 0 24px 24px;
            overflow: hidden; 
        }

        /* Fullscreen Layout Styles */
        :fullscreen { background: var(--bg-base); }
        .code-workspace:fullscreen {
            border-radius: 0;
            width: 100vw;
            height: 100vh;
        }
        .code-workspace:fullscreen pre[class*="language-"] {
            border-radius: 0 !important;
            padding: 40px !important; /* Extra breathing room in fullscreen */
        }
        .code-workspace:fullscreen pre[class*="language-"]::-webkit-scrollbar-track {
            border-radius: 0;
        }
        .code-workspace:fullscreen .preview-pane {
            border-radius: 0 !important;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 9999;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            header { width: 95%; padding: 12px 20px; top: 12px; }
            .tutorial-title { font-size: 1.5rem; }
            .tab-btn { padding: 12px 16px; font-size: 0.85rem; }
            .video-container { padding: 16px; border-radius: 16px; }
            .preview-pane { min-height: 300px; padding: 0; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="brand-logo">Sudam's Code Cafe</a>
        <a href="index.html" class="back-btn">&larr; Back to Studio</a>
    </header>

    <main class="container" id="tutorial-content">
        <p style="text-align: center; padding: 40px; color: var(--text-muted);">Brewing tutorial data...</p>
    </main>

    <div id="toast" class="toast">Action Successful</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tutorialId = urlParams.get('id');

        window.currentHtmlCode = "";

        async function loadSingleTutorial() {
            try {
                const response = await fetch('./data/tutorials.json');
                const tutorials = await response.json();
                const tutorial = tutorials.find(t => t.id === tutorialId);

                if (!tutorial) {
                    document.getElementById('tutorial-content').innerHTML = '<h2>Tutorial not found.</h2><a href="index.html">Go back</a>';
                    return;
                }

                let htmlCode = "\n";

                try {
                    const res = await fetch('./codes/' + tutorial.id + '/index.html');
                    if (res.ok) {
                        htmlCode = await res.text();
                    }
                } catch (fetchError) {
                    console.warn("Code file not found yet. Showing placeholder.");
                }

                window.currentHtmlCode = htmlCode;

                document.getElementById('tutorial-content').innerHTML = `
                    <div class="video-container">
                        <div class="video-wrapper">
                            <iframe 
                                src="https://www.youtube.com/embed/${tutorial.youtubeVideoId}" 
                                title="YouTube video player" frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                            </iframe>
                        </div>
                        <div class="tutorial-header">
                            <h1 class="tutorial-title">${tutorial.title}</h1>
                            <p class="tutorial-desc">${tutorial.description}</p>
                        </div>
                    </div>

                    <div class="code-workspace" id="workspace">
                        <div class="tabs">
                            <div class="tab-links">
                                <button class="tab-btn active" onclick="switchTab(event, 'preview')">Live Preview</button>
                                <button class="tab-btn" onclick="switchTab(event, 'code')">Code</button>
                            </div>
                            <div class="action-bar">
                                <button class="icon-btn" onclick="copyCode()" title="Copy Code">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                                <button class="icon-btn" onclick="shareTutorial('${tutorial.youtubeVideoId}')" title="Share Tutorial">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                </button>
                                <button class="icon-btn" onclick="toggleFullscreen('workspace')" title="Full Screen Workspace">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                                </button>
                            </div>
                        </div>

                        <div id="preview" class="tab-content active">
                            <div class="preview-pane">
                                <iframe id="preview-frame" style="width: 100%; height: 100%; min-height: 400px; border: none;"></iframe>
                            </div>
                        </div>

                        <div id="code" class="tab-content">
                            <pre><code class="language-markup">${escapeHTML(htmlCode)}</code></pre>
                        </div>
                    </div>
                `;

                if (window.Prism) { Prism.highlightAll(); }

                const previewFrame = document.getElementById('preview-frame');
                const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
                
                doc.open();
                doc.write(htmlCode);
                doc.close();

            } catch (error) {
                console.error("Critical Error:", error);
                document.getElementById('tutorial-content').innerHTML = '<p>Something went wrong loading the UI.</p>';
            }
        }

        window.showToast = function(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.transform = 'translateY(100px)';
                toast.style.opacity = '0';
            }, 3000);
        };

        window.copyCode = async function() {
            try {
                await navigator.clipboard.writeText(window.currentHtmlCode);
                window.showToast('Code copied to clipboard!');
            } catch (err) {
                console.error('Failed to copy code', err);
            }
        };

        window.shareTutorial = async function(videoId) {
            const ytLink = `https://youtu.be/${videoId}`;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: "Sudam's Code Cafe Tutorial",
                        url: ytLink
                    });
                } catch (err) {
                    console.error('Share failed', err);
                }
            } else {
                await navigator.clipboard.writeText(ytLink);
                window.showToast('YouTube link copied to clipboard!');
            }
        };

        window.toggleFullscreen = function(elementId) {
            const elem = document.getElementById(elementId);
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(err => {
                        console.error(`Error attempting to enable fullscreen: ${err.message}`);
                    });
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        };

        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        loadSingleTutorial();
    </script>
</body>
</html>
